name: Send Preopen Report Now

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/send-preopen-now.yml"
      - "tw_preopen_decision_system.py"

jobs:
  send-preopen-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send preopen report to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python tw_preopen_decision_system.py
